<!DOCTYPE html>
<html lang="en">
<head>
    <title>KlicforChange</title>

</head>
<body>
<!-- title -->
    <div>
        <h2>KlicforChange</h2>
    </div>
<!-- logo buttons with link -->
    <div class="logo_buttons">
        <img src="logo_facebook.png" alt="logo_facebook" id="report-facebook" class="report-btn">

        <img src="logo_snapchat.png" alt="logo_snapchat" id="report-snapchat" class="report-btn" data-link="https://help.snapchat.com/hc/en-us/requests/new?co=true&tf_23701027754644=cf_report_violation_other_under_13&ticket_form_id=17471023300884">
        <img src="logo_tiktok.png" alt="logo_tiktok" id="report-tiktok" class="report-btn" data-link="https://www.tiktok.com/legal/report/feedback">
    </div>
<!-- text after logos -->
    <div class="below_text">
        <p></p>

    </div>

<!-- JS script  -->
